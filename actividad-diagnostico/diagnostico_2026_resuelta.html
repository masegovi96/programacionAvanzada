<!DOCTYPE html>
<html lang="es">

<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Actividad de diagnóstico 2026 resuelta: TODO List con HTML, CSS y JavaScript.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/todo.css">
    <link rel="icon" type="image/jpeg" href="media/jigsaw.jpg">
    <title>Diagnóstico 2026 – Resuelta | Programación Avanzada</title>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-4">

        <h1 class="text-center mb-1">
            Actividad de Diagnóstico 2026
        </h1>
        <div class="todo-app mb-5">

            <h2 class="mb-3" style="font-size:1.4rem;">
                <i class="fa-solid fa-list-check me-2 text-primary"></i>Mi Lista de Pendientes
            </h2>

            <div class="todo-input-row">
                <input
                    type="text"
                    id="task-input"
                    placeholder="Escribe una nueva tarea…"
                    aria-label="Nueva tarea"
                    maxlength="200"
                >
                <button class="btn btn-primary" id="add-btn">
                    <i class="fa-solid fa-plus me-1"></i>Agregar
                </button>
            </div>

            <p class="todo-counter" id="counter">0 tareas pendientes</p>

            <div class="filter-btns" role="group" aria-label="Filtrar tareas">
                <button class="active-filter" data-filter="all">Todas</button>
                <button data-filter="pending">Pendientes</button>
                <button data-filter="completed">Completadas</button>
            </div>

            <ul id="todo-list" aria-live="polite" aria-label="Lista de tareas"></ul>

            <p class="todo-empty d-none" id="empty-msg">
                <i class="fa-regular fa-face-meh me-1"></i>No hay tareas para mostrar.
            </p>
        </div>

    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <script src="js/todo.js"></script>
</body>

</html>
