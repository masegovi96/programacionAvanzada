<!DOCTYPE html>
<html lang="es">

<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/jpeg" href="assets/media/jigsaw.jpg">
    <title>Tarea 1 | Programación Avanzada</title>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-5">
        <h1 class="text-center mb-2">Tarea 1: Caso Real</h1>

        <section class="mb-4">
            <h2><i class="fa-solid fa-file-pdf me-2" style="color:var(--accent-primary)"></i>Instrucciones de la tarea</h2>
            <div class="pdf-embed-container">
                <iframe
                    src="pages/tarea-1/Tarea%201%20-%20An%C3%A1lisis%20de%20caso.pdf"
                    title="Tarea 1 - Análisis de caso real">
                </iframe>
            </div>
        </section>

        <section class="mb-4">
            <h2>Tu caso asignado</h2>
            <p>Haz clic en tu número para ver el enunciado. Haz clic de nuevo o en la <strong>×</strong> para cerrarlo.</p>

            <div class="case-btn-grid" id="caseBtnGrid"></div>
            <div id="caseDisplay" class="case-display mt-3"></div>

            <div class="alert alert-info mt-3" role="alert">
                <i class="fa-solid fa-circle-info me-2"></i>
                Si tienes dudas sobre qué número te corresponde, consulta con el docente.
            </div>
        </section>

    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/scripts.js"></script>
</body>

</html>
